# version: '5.0.1'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ecommerce_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user_sai_varma}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pwd_postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ecommerce_analytics}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_sai_varma -d ecommerce_analytics"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce_network

  # PySpark ETL Job
  etl:
    build:
      context: ./etl
      dockerfile: Dockerfile
    container_name: ecommerce_etl
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-ecommerce_analytics}
      POSTGRES_USER: ${POSTGRES_USER:-user_sai_varma}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pwd_postgres}
    volumes:
      - ./data:/app/data
      - ./etl:/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ecommerce_network
    # Run ETL job and exit
    command: python3 spark_jobs/main.py

  # FastAPI Backend
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: ecommerce_api
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-ecommerce_analytics}
      POSTGRES_USER: ${POSTGRES_USER:-user_sai_varma}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pwd_postgres}
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ecommerce_network
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # Streamlit Dashboard
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: ecommerce_dashboard
    environment:
      API_URL: http://api:8000
    ports:
      - "8501:8501"
    volumes:
      - ./dashboard:/app
    depends_on:
      - api
    networks:
      - ecommerce_network
    command: streamlit run app.py --server.port=8501 --server.address=0.0.0.0

  # Optional: Flask Alternative (uncomment to use)
  # flask_app:
  #   build:
  #     context: ./flask_app
  #     dockerfile: Dockerfile
  #   container_name: ecommerce_flask
  #   environment:
  #     POSTGRES_HOST: postgres
  #     POSTGRES_PORT: 5432
  #     POSTGRES_DB: ${POSTGRES_DB:-ecommerce_analytics}
  #     POSTGRES_USER: ${POSTGRES_USER:-ecommerce_user}
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecommerce_pass}
  #   ports:
  #     - "5000:5000"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   networks:
  #     - ecommerce_network

volumes:
  postgres_data:

networks:
  ecommerce_network:
    driver: bridge
